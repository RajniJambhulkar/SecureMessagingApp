<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600 px-4">

  <!-- <div class="bg-white w-96 p-8 rounded-2xl shadow-2xl"> -->

    <div class="bg-white w-full max-w-sm md:max-w-md p-6 md:p-8 rounded-2xl shadow-2xl">

    <form #loginform="ngForm" (ngSubmit)="onLogin()" class="space-y-2">

      <!-- Profile Upload (Form Field) -->
      <div class="flex flex-col items-center text-2xl my-2 mb-5 font-medium">Login
      </div>

      <!-- Email -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email Address</mat-label>
        <input 
        matInput 
        type="email"
         name="email" 
         [(ngModel)]="email" 
         required 
         email 
         #emailRef="ngModel">
         @if(emailRef.invalid && emailRef.touched){
        <mat-error>
          Please enter a valid email
        </mat-error>
      }
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>

        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordRef="ngModel">

        <!-- <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          {{ hidePassword ? '👁' : '🙈' }}
        </button> -->

        <mat-error *ngIf="passwordRef.invalid && passwordRef.touched">
          Password must be at least 6 characters
        </mat-error>

      </mat-form-field>

  <app-button 
  [isDisabled]="!!loginform?.invalid"
  [isLoading]="authService.isLoading()"/>

     
      <p class="text-center text-sm text-gray-600">
        Already have an account?
        <a routerLink="/register" class="text-indigo-500 font-semibold hover:underline">
          Register
        </a>
      </p>

    </form>

  </div>

</div>
