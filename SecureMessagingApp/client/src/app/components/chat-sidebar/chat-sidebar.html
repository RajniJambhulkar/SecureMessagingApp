<div class="w-80 h-screen bg-white shadow-lg flex flex-col">

<div class="flex items-center justify-between px-4 py-3 border-b bg-white">

  <!-- LEFT: User Info -->
  <div class="flex items-center gap-3 min-w-0">
    
    <!-- Avatar -->
    <div class="h-10 w-10 rounded-full overflow-hidden flex-shrink-0">
      <img 
        [src]="authService.currentLoggedUser()?.profileImage || '/avatar-11.png'"
        class="w-full h-full object-cover">
    </div>

    <!-- Name + Status -->
    <div class="flex flex-col min-w-0">
      <p class="text-sm font-semibold text-gray-800 truncate">
        {{ authService.currentLoggedUser()?.fullName }}
      </p>
      <p class="text-xs text-gray-500 truncate">
        Online
      </p>
    </div>
  </div>

  <!-- RIGHT: Actions -->
  <div class="flex items-center gap-2 flex-shrink-0">
    
    <button class="p-2 rounded-full hover:bg-gray-100">
      <mat-icon class="text-gray-600 text-[20px]">search</mat-icon>
    </button>

    <button class="mat-icon-button p-2 rounded-full hover:bg-gray-100" [matMenuTriggerFor]="menu">
      <mat-icon class="text-gray-600 text-[20px]">more_vert</mat-icon>     
    </button>
    <mat-menu #menu="matMenu">
                <button class="flex items-center gap-2 p-2 text-indigo-500 hover:text-indigo-700">
                    <mat-icon>settings</mat-icon>
                    <span>Settings</span>
                </button>
                <button (click)="logout()"
                 class="flex items-center gap-2 p-2 text-indigo-500 hover:text-indigo-700">
                    <mat-icon>logout</mat-icon>
                    <span>Logout</span>
                </button>
            </mat-menu>

  </div>

            
    </div>
    

    <!-- Search -->
    <div class="p-3 pt-2">
        <input type="text" placeholder="Search users..."
            class="w-full px-3 py-2 rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm" />
    </div>

    <!-- User List -->
    <div class="flex-1 overflow-y-auto">
        @for (user of chatService.onlineUsers(); track user.id) {

        <div 
        (click)="openChatWindow(user)"
        class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-indigo-50 transition">
           
            <!-- Avatar -->
            <div class="relative">
                <img [src]="user.profileImage || '/avatar-11.png'"
                    class="w-12 h-12 rounded-full object-cover" />

                <!-- Online Indicator -->
                
                <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white"
                    [ngClass]="user.isOnline ? 'bg-green-500' : 'bg-gray-400'">
                </span>
            </div>

            <!-- User Info -->
            <div class="flex-1">
                <h3 class="text-sm font-semibold text-gray-800">
                    {{ user.fullName | titlecase}}
                </h3>
                
            </div>

            <!-- Unread Count -->
            <div class="bg-indigo-500 text-white text-xs px-2 py-1 rounded-full">
                {{ user.unreadCount? user.unreadCount + 'new messages' : '' }}
            </div>

        </div>
        

        }
      

    </div>

</div>
